name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run compile
      - run: npx --yes @vscode/vsce package --no-dependencies --out claude-context-status.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: claude-context-status-vsix-${{ github.sha }}
          path: claude-context-status.vsix
